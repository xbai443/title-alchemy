async function generate() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { showToast('\u8bf7\u5148\u8f93\u5165\u6587\u7ae0\u4e3b\u9898\u6216\u5185\u5bb9'); return; }

  const key = getApiKey();
  if (!key) { showToast('🔌 模板模式 - 查看示例标题'); generateFromLocal(); return; }
  const used = getUsageToday();
  if (used >= 50) { showToast('\u4eca\u65e5\u989d\u5ea6\u5df2\u7528\u5b8c\uff0850/50\uff09\uff0c\u660e\u5929\u518d\u6765\u5427'); return; }
  updateUsageDisplay();

  const platform = document.getElementById('platformSelect').value;
  const style = document.getElementById('styleSelect').value;
  const btn = document.getElementById('genBtn');
  const rc = document.getElementById('resultsCard');
  const ld = document.getElementById('loadingEl');
  const ct = document.getElementById('resultsContainer');

  btn.disabled = true;
  btn.textContent = '\u23f3 \u751f\u6210\u4e2d...';
  rc.style.display = 'block';
  ld.style.display = 'block';
  ct.innerHTML = '';

  let sys = PLATFORM_SYSTEM[platform] || '\u4f60\u662f\u7206\u6b3e\u6807\u9898\u4e13\u5bb6\u3002';
  if (style !== 'auto' && STYLE_PROMPTS[style]) {
    sys += '\n\n\u5f53\u524d\u9700\u8981\u751f\u6210\u300e' + style + '\u300f\u7c7b\u578b\u6807\u9898\u2014\u2014' + STYLE_PROMPTS[style];
  }
  sys += '\n\n\u8981\u6c42\uff1a1.\u751f\u62103\u4e2a\u4e0d\u540c\u89d2\u5ea6\u7684\u6807\u9898 2.\u7528\u30101\u3011\u30102\u3011\u30103\u3011\u6807\u6ce8 3.\u6bcf\u4e2a\u6807\u9898\u4e0d\u8d85\u8fc730\u5b57 4.\u53ea\u8f93\u51fa\u6807\u9898\uff0c\u4e0d\u8981\u89e3\u91ca';

  try {
    const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'deepseek-chat',
        messages:[{role:'system',content:sys},{role:'user',content:topic}],
        max_tokens:200,
        temperature:0.8
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.choices[0].message.content;
    const items = raw.split(/\u3010\d+\u3011/).filter(t => t.trim()).map(t => t.replace(/^[\s\u3001\uff0c\uff0e\uff01\n]+|[\s\u3001\uff0c\uff0e\uff01\n]+$/g,''));
    if (items.length===0) items.push(raw.trim());

    ld.style.display = 'none';
    const pn = PLATFORMS[platform]?.name || platform;
    const sn = style==='auto'?'\u667a\u80fd\u5339\u914d':style;
    ct.innerHTML = '<div class="text-sm text-dim" style="margin-bottom:14px">' + pn + ' \u00b7 ' + sn + '</div>';

    items.forEach((t,i) => {
      const safe = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      const card = document.createElement("div");
      card.className = "result-card";
      card.dataset.title = t;
      card.dataset.platform = platform;
      card.dataset.style = style;
      card.innerHTML = "<div class=\"result-num\">"+(i+1)+"</div><div class=\"result-text\">"+safe+"</div><div class=\"result-actions\"><button class=\"copy-btn\" title=\"复制\">📋</button><button class=\"fav-btn\" title=\"收藏\">🤍</button></div>";
      ct.appendChild(card);
      
    });
    addUsage();
    updateUsageDisplay();
    const rec = {id:Date.now(),topic:topic.slice(0,45)+(topic.length>45?'...':''),platform:pn,style:sn,titles:items,time:new Date().toLocaleString()};
    history.unshift(rec);
    if(history.length>50) history.pop();
    localStorage.setItem('thistory',JSON.stringify(history));
    renderHistory();

  } catch(e) {
    ld.style.display = 'none';
    ct.innerHTML = '<div style="color:#ef4444;text-align:center;padding:20px">\u274c \u751f\u6210\u5931\u8d25\uff1a'+e.message+'</div>';
  } finally {
    btn.disabled=false;
    btn.textContent='\u2728 \u751f\u6210\u7206\u6b3e\u6807\u9898';
  }
}

let toastTimer;
function showToast(m) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toastEl');
  el.textContent = m;
  el.classList.add('show');
  toastTimer = setTimeout(()=>el.classList.remove('show'),2000);
}

document.getElementById('resultsContainer').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if(!btn) return;
  const card = btn.closest('.result-card');
  if(!card) return;
  const title = card.dataset.title;
  if(btn.classList.contains('copy-btn')) {
    navigator.clipboard.writeText(title).then(()=>{
      btn.textContent='\u2705';
      btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='\ud83d\udccb';btn.classList.remove('copied');},1500);
      showToast('\u5df2\u590d\u5236\u5230\u526a\u8d34\u677f');
    });
  }
  if(btn.classList.contains('fav-btn')) {
    const idx = favorites.findIndex(f=>f.title===title);
    if(idx>=0){favorites.splice(idx,1);btn.textContent='\ud83e\udd0d';}
    else{favorites.unshift({id:Date.now(),title:title,platform:card.dataset.platform,style:card.dataset.style,time:new Date().toLocaleString()});btn.textContent='\u2764\ufe0f';}
    localStorage.setItem('tfavorites',JSON.stringify(favorites));
    renderHistory();
  }
});

document.querySelectorAll('.history-tab').forEach(t=>{
  t.addEventListener('click',function(){
    document.querySelectorAll('.history-tab').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    currentTab=this.dataset.tab;
    document.getElementById('recentList').style.display=currentTab==='recent'?'block':'none';
    document.getElementById('favoritesList').style.display=currentTab==='favorites'?'block':'none';
  });
});

function escapeAttr(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function renderHistory() {
  const rl=document.getElementById('recentList');
  const fl=document.getElementById('favoritesList');
  if(history.length===0){rl.innerHTML='<div class="history-empty">\u8fd8\u6ca1\u6709\u751f\u6210\u8bb0\u5f55\uff0c\u5f00\u59cb\u521b\u4f5c\u5427</div>';}
  else{
    rl.innerHTML=history.map(r=>{
      const topicSafe=r.topic.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      const titlesHtml=r.titles.map(t=>'<span class="tag">'+t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')+'</span>').join('');
      const onClick='document.getElementById("topicInput").value="'+escapeAttr(r.topic.replace(/\.\.\.$/,''))+'";document.getElementById("topicInput").focus();showToast("\u4e3b\u9898\u5df2\u586b\u5165");';
      return '<div class="history-item"><div class="history-item-header"><span class="history-meta">'+r.platform+' \u00b7 '+r.style+' \u00b7 '+r.time+'</span></div><div class="history-topic" onclick=\'+onClick+\'>'+topicSafe+'</div><div>'+titlesHtml+'</div></div>';
    }).join('');
  }
  if(favorites.length===0){fl.innerHTML='<div class="history-empty">\u8fd8\u6ca1\u6709\u6536\u85cf\u7684\u6807\u9898</div>';}
  else{
    fl.innerHTML=favorites.map(f=>'<div class="history-item"><div class="history-item-header"><span class="history-meta">'+f.platform+' \u00b7 '+f.style+' \u00b7 '+f.time+'</span></div><div class="history-topic">'+f.title.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')+'</div></div>').join('');
  }
}
renderHistory();
// Settings functions
function toggleSettings() {
  var c = document.getElementById('settingsCard');
  c.style.display = c.style.display === 'none' ? 'block' : 'none';
  var sk = getApiKey();
  if (sk) {
    document.getElementById('apiKeyInput').value = sk;
    document.getElementById('keyStatus').innerHTML = '<span style="color:#10b981">\u2705 Key \u5df2\u8bbe\u7f6e</span>';
  }
  updateUsageDisplay();
}
function saveApiKey() {
  var val = document.getElementById('apiKeyInput').value.trim();
  if (!val) { setApiKey(''); document.getElementById('keyStatus').innerHTML = '<span style="color:#888">Key \u5df2\u6e05\u9664</span>'; return; }
  if (!val.startsWith('sk-')) { document.getElementById('keyStatus').innerHTML = '<span style="color:#ef4444">\u274c Key \u683c\u5f0f\u4e0d\u5bf9</span>'; return; }
  setApiKey(val);
  document.getElementById('keyStatus').innerHTML = '<span style="color:#10b981">\u2705 Key \u4fdd\u5b58\u6210\u529f!</span>';
  document.getElementById('settingsBtn').style.color = '';
  updateUsageDisplay();
  showToast('\u2705 API Key \u5df2\u4fdd\u5b58');
  setTimeout(function(){ document.getElementById('settingsCard').style.display = 'none'; }, 800);
}
function updateUsageDisplay() {
  var el = document.getElementById('usageCount');
  if (el) { el.textContent = getApiKey() ? getUsageToday() : '--'; }
}
// Init on page load
(function() {
  var sk = getApiKey();
  if (sk) { updateUsageDisplay(); }
  // Debug: auto-open settings from URL param
  var p = new URLSearchParams(window.location.search);
  if (p.get('showSettings') === '1') {
    setTimeout(function(){
      var c = document.getElementById('settingsCard');
      if (c) { c.style.display = 'block'; console.log('Settings opened by URL param'); }
    }, 500);
  }
  if (p.get('test') === '1') {
    document.title = 'TEST_MODE_ACTIVE';
    document.getElementById('topicInput').value = 'TEST MODE WORKING';
  }
})();

// Demo mode: auto-fill and generate from URL params
(function() {
  const params = new URLSearchParams(window.location.search);
  const demo = params.get('demo');
  if (demo) {
    const ta = document.getElementById('topicInput');
    if (ta) {
      ta.value = decodeURIComponent(demo);
      ta.style.borderColor = '#4facfe';
      ta.style.boxShadow = '0 0 12px rgba(79,172,254,0.4)';
      setTimeout(function() {
        document.getElementById('genBtn').click();
      }, 800);
    }
  }
})();
// Generate from local templates (demo mode)
function generateFromLocal() {
  var topic = document.getElementById('topicInput').value.trim() || '默认话题';
  var platform = document.getElementById('platformSelect').value;
  var style = document.getElementById('styleSelect').value;
  var btn = document.getElementById('genBtn');
  var rc = document.getElementById('resultsCard');
  var ld = document.getElementById('loadingEl');
  var ct = document.getElementById('resultsContainer');
  var platformName = document.getElementById('platformSelect').options[document.getElementById('platformSelect').selectedIndex].text;

  btn.disabled = true;
  btn.textContent = '⏳ 加载中...';
  rc.style.display = 'block';
  ld.style.display = 'block';
  ct.innerHTML = '';

  var db = document.getElementById('demoBadge');
  if (db) db.style.display = 'inline-block';

  setTimeout(function() {
    var templates = LOCAL_TEMPLATES[platform] || LOCAL_TEMPLATES.smart;
    var hash = 0;
    for (var i = 0; i < topic.length; i++) {
      hash = ((hash << 5) - hash) + topic.charCodeAt(i);
      hash |= 0;
    }
    var items = [];
    for (var j = 0; j < 3; j++) {
      items.push(templates[Math.abs(hash + j * 7) % templates.length]);
    }

    ld.style.display = 'none';
    ct.innerHTML = '<div class="text-sm text-dim" style="margin-bottom:14px">' + platformName + ' · 模板模式 <span style="color:#fbbf24">🔌</span></div><div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.15);border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#fbbf24"><strong>🔔 模板模式</strong>：这是示例标题。设置 DeepSeek API Key 后可生成真实 AI 内容。</div>';

    items.forEach(function(t, i) {
      var safeT = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      var card = document.createElement("div");
      card.className = "result-card";
      card.dataset.title = t;
      card.dataset.platform = platform;
      card.dataset.style = style;
      card.innerHTML = '<div class="result-num">' + (i + 1) + '</div><div class="result-text">' + safeT + '</div><div class="result-actions"><button class="copy-btn" title="复制">📋</button><button class="fav-btn" title="收藏">🤍</button></div>';
      ct.appendChild(card);
    });

    var rec = {id:Date.now(), topic:topic.slice(0,45)+(topic.length>45?'...':''), platform:platformName, style:style+'(模板)', titles:items, time:new Date().toLocaleString()};
    history.unshift(rec);
    if(history.length>50) history.pop();
    localStorage.setItem('thistory',JSON.stringify(history));
    renderHistory();

    btn.disabled = false;
    btn.textContent = '✨ 生成爆款标题';
  }, 1200);
}

// Export CSV
function exportCSV() {
  var rows = [['时间', '平台', '风格', '主题', '标题']];
  if (history.length === 0 && favorites.length === 0) { showToast('没有可导出的记录'); return; }

  history.forEach(function(r) {
    (r.titles || []).forEach(function(t) {
      rows.push([r.time||'', r.platform||'', r.style||'', r.topic||'', t]);
    });
  });
  favorites.forEach(function(f) {
    rows.push([f.time||'', f.platform||'', f.style||'', '', f.title||'']);
  });

  var csv = rows.map(function(row) {
    return row.map(function(cell) {
      var s = String(cell).replace(/"/g, '""');
      if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
        s = '"' + s + '"';
      }
      return s;
    }).join(',');
  }).join('\n');

  var blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '标题炼金术_导出_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✔ 已导出 ' + rows.length + ' 条记录');
}

// Clear history
function clearHistory() {
  if (!confirm('确定清空所有历史记录？这个操作不可撤销。')) return;
  history = [];
  favorites = [];
  localStorage.setItem('thistory', JSON.stringify(history));
  localStorage.setItem('tfavorites', JSON.stringify(favorites));
  renderHistory();
  showToast('✔ 历史记录已清空');
}
</script>
